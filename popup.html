<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RD Manager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header id="header">
    <div class="header-left">
      <span class="logo-icon" data-i18n-title="panelTitle">
        <svg viewBox="0 0 209.281 209.281">
          <path d="M203.456,139.065c3.768-10.786,5.824-22.369,5.824-34.425s-2.056-23.639-5.824-34.425c-0.092-0.324-0.201-0.64-0.333-0.944 C188.589,28.926,149.932,0,104.641,0S20.692,28.926,6.159,69.271c-0.132,0.305-0.242,0.62-0.333,0.944 c-3.768,10.786-5.824,22.369-5.824,34.425s2.056,23.639,5.824,34.425c0.092,0.324,0.201,0.64,0.333,0.944 c14.534,40.346,53.191,69.271,98.482,69.271s83.948-28.926,98.482-69.271C203.255,139.705,203.364,139.39,203.456,139.065z M104.641,194.281c-3.985,0-10.41-7.212-15.78-23.324c-2.592-7.775-4.667-16.713-6.179-26.436H126.6 c-1.512,9.723-3.587,18.66-6.178,26.436C115.051,187.069,108.626,194.281,104.641,194.281z M80.862,129.521 c-0.721-7.998-1.102-16.342-1.102-24.881s0.381-16.883,1.102-24.881h47.557c0.721,7.998,1.102,16.342,1.102,24.881 s-0.381,16.883-1.102,24.881H80.862z M15.001,104.641c0-8.63,1.229-16.978,3.516-24.881h47.3 c-0.701,8.163-1.057,16.529-1.057,24.881s0.355,16.718,1.057,24.881h-47.3C16.23,121.618,15.001,113.271,15.001,104.641z M104.641,15c3.985,0,10.411,7.212,15.781,23.324c2.591,7.775,4.667,16.713,6.178,26.435H82.681 c1.512-9.723,3.587-18.66,6.179-26.435C94.231,22.212,100.656,15,104.641,15z M143.464,79.76h47.3 c2.287,7.903,3.516,16.251,3.516,24.881s-1.229,16.978-3.516,24.881h-47.3c0.701-8.163,1.057-16.529,1.057-24.881 S144.165,87.923,143.464,79.76z M184.903,64.76h-43.16c-2.668-18.397-7.245-34.902-13.666-46.644 C152.972,24.865,173.597,42.096,184.903,64.76z M81.204,18.115C74.783,29.857,70.206,46.362,67.538,64.76h-43.16 C35.685,42.096,56.309,24.865,81.204,18.115z M24.378,144.521h43.16c2.668,18.397,7.245,34.902,13.666,46.645 C56.309,184.416,35.685,167.186,24.378,144.521z M128.077,191.166c6.421-11.742,10.998-28.247,13.666-46.645h43.16 C173.597,167.186,152.972,184.416,128.077,191.166z"/>
        </svg>
      </span>
      <span class="logo-text">RD <span class="logo-accent">Manager</span></span>
    </div>
    <div class="header-right">
      <div id="header-plan-tile" class="header-plan-tile" style="display:none;">
        <span id="header-plan-name" class="header-plan-name"></span>
        <span id="header-plan-expiry" class="header-plan-expiry"></span>
      </div>
      <button id="btn-settings" class="icon-btn" data-i18n-title="settings">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button id="btn-theme" class="icon-btn" data-i18n-title="toggleTheme">
        <svg class="icon sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="none" stroke="currentColor" stroke-width="2"/><line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <svg class="icon moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="btn-notifications" class="icon-btn" data-i18n-title="notifications">
        <svg class="icon" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.73 21a2 2 0 0 1-3.46 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="notification-badge hidden" id="notification-badge">0</span>
      </button>
    </div>
  </header>

  <div id="action-bar">
    <button id="btn-add-torrent" class="action-btn primary">
      <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <span data-i18n="addTorrent"></span>
    </button>
    <button id="btn-add-webdl" class="action-btn secondary">
      <svg class="icon" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span data-i18n="unlockLink"></span>
    </button>
    <button id="btn-refresh" class="action-btn ghost" data-i18n-title="refresh">
      <svg class="icon refresh-icon" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <svg class="icon check-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <div id="search-box" class="search-container">
    <div class="search-row">
      <div class="search-input-wrap">
        <input type="text" id="search-input" class="search-input" data-i18n-placeholder="searchPlaceholder" spellcheck="false">
        <span id="search-count" class="search-count"></span>
      </div>
      <div class="age-filter-wrap">
        <button id="btn-age-filter" class="age-filter-btn">
          <span id="age-filter-label" data-i18n="olderThan"></span>
          <svg class="icon age-filter-chevron" viewBox="0 0 24 24" width="12" height="12"><polyline points="6 9 12 15 18 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div id="age-filter-menu" class="age-filter-menu hidden">
          <button class="age-filter-option" data-age="1" data-i18n="moreThan1Day"></button>
          <button class="age-filter-option" data-age="7" data-i18n="moreThan1Week"></button>
          <button class="age-filter-option" data-age="30" data-i18n="moreThan1Month"></button>
          <button class="age-filter-option age-filter-clear hidden" data-age="" data-i18n="clearFilter"></button>
        </div>
      </div>
    </div>
  </div>

  <nav id="tabs">
    <button class="tab active" data-tab="all" data-i18n="tabAll"></button>
    <button class="tab" data-tab="downloading" data-i18n="tabActive"></button>
    <button class="tab" data-tab="completed" data-i18n="tabCompleted"></button>
    <button class="tab tab-type-cycle" id="tab-type-cycle" data-tab="torrents" data-cycle-state="none" data-i18n="tabType"></button>
    
    <button id="btn-select-all" class="tab hidden" data-i18n-title="selectAll">
      <svg class="icon" viewBox="0 0 24 24" style="width:14px;height:14px;" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span data-i18n="selectAll"></span>
    </button>
    <button id="btn-cancel-select" class="tab hidden" data-i18n-title="cancel">
      <svg class="icon" viewBox="0 0 24 24" style="width:14px;height:14px;" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    
    <button id="btn-delete-all" class="tab tab-delete-all" data-i18n-title="deleteAllTooltip">
      <svg class="icon" viewBox="0 0 24 24" style="width:14px;height:14px;" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg><span id="delete-btn-text" data-i18n="deleteAll"></span>
    </button>
  </nav>

  <main id="downloads-container">
    <div id="loading" class="state-message">
      <div class="spinner"></div>
      <span data-i18n="loadingDownloads"></span>
    </div>
    <div id="empty" class="state-message hidden">
      <svg viewBox="0 0 24 24" width="40" height="40"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round"/><polyline points="7 10 12 15 17 10" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="15" x2="12" y2="3" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span data-i18n="noDownloads"></span>
    </div>
    <div id="no-api" class="state-message hidden">
      <svg viewBox="0 0 24 24" width="40" height="40"><rect x="3" y="11" width="18" height="11" rx="2" ry="2" fill="none" stroke="var(--text-muted)" stroke-width="1.5"/><path d="M7 11V7a5 5 0 0 1 10 0v4" fill="none" stroke="var(--text-muted)" stroke-width="1.5"/></svg>
      <span data-i18n="loginToStart"></span>
      <button id="btn-login-api" class="action-btn primary" style="margin-top:8px;" data-i18n="connectRd"></button>
    </div>
    <ul id="download-list"></ul>
  </main>

  <div id="modal-overlay" class="hidden">
    <div id="modal" role="dialog">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close" class="icon-btn">
          <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>
  
  <div id="toast-container"></div>

<script type="module" src="popup.js"></script>
</body>
</html>
